[workspace]
channels = ["conda-forge"]
name = "BPT"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "13"

[dependencies]
python = ">=3.14.5,<3.15"
astropy = ">=7.2.0,<8"
ipython = ">=9.13.0,<10"
numpy = ">=2.4.6,<3"
matplotlib = ">=3.10.9,<4"
scipy = ">=1.17.1,<2"
optuna = ">=4.9.0,<5"

[target.osx-arm64.dependencies]
pytorch = ">=2.10.0,<3"

[target.linux-64.dependencies]
pytorch-gpu = ">=2.10.0,<3"

[pypi-dependencies]
pytorch-lightning = ">=2.6.5, <3"
ipympl = ">=0.10.0, <0.11"


